name: Auto Publish Podcast
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install gspread oauth2client PyGithub requests
        
      # Bỏ bước "Create Credentials" tạo file đi
        
      - name: Run Publisher
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python podcast_publisher.py
